name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release, e.g. v1.3.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser (macOS)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --config .goreleaser.yaml --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/*.tar.gz

  release-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compilers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Run GoReleaser (Linux + Windows)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --config .goreleaser-linux-windows.yaml --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-windows
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    needs: [release-macos, release-linux-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Collect all archives
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

          # Generate checksums
          cd release
          sha256sum * > checksums.txt
          cd ..

          # Create the release, or upload assets to it if it already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber release/*
          else
            gh release create "$TAG" \
              --title "wacli-pro $TAG" \
              --generate-notes \
              release/*
          fi
