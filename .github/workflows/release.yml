name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser (macOS)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --config .goreleaser.yaml --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/*.tar.gz

  release-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install cross-compilers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Run GoReleaser (Linux + Windows)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --config .goreleaser-linux-windows.yaml --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-windows
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    needs: [release-macos, release-linux-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect all archives
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

          # Generate checksums
          cd release
          sha256sum * > checksums.txt
          cd ..

          # Create GitHub release
          gh release create "${{ github.ref_name }}" \
            --title "wacli-pro ${{ github.ref_name }}" \
            --generate-notes \
            release/*
